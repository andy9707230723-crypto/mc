<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minecraft 生態域搜尋器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="min-h-screen bg-stone-950 text-stone-100">
    <main class="mx-auto flex min-h-screen w-full max-w-7xl flex-col gap-5 px-4 py-5 sm:px-6 lg:px-8">
      <header class="flex flex-col gap-3 border-b border-white/10 pb-5 md:flex-row md:items-end md:justify-between">
        <div>
          <p class="text-sm font-medium text-emerald-300">Seed-based biome scanner</p>
          <h1 class="mt-1 text-3xl font-semibold tracking-normal text-white sm:text-4xl">Minecraft 生態域搜尋器</h1>
        </div>
        <div class="grid grid-cols-3 gap-2 text-center text-xs text-stone-300 sm:text-sm">
          <div class="rounded-md border border-white/10 bg-white/5 px-3 py-2">
            <span class="block text-stone-500">版本模式</span>
            <strong class="font-medium text-stone-100">1.20+ 近似</strong>
          </div>
          <div class="rounded-md border border-white/10 bg-white/5 px-3 py-2">
            <span class="block text-stone-500">掃描</span>
            <strong class="font-medium text-stone-100">Worker</strong>
          </div>
          <div class="rounded-md border border-white/10 bg-white/5 px-3 py-2">
            <span class="block text-stone-500">複製</span>
            <strong class="font-medium text-stone-100">/tp 指令</strong>
          </div>
        </div>
      </header>

      <section class="grid gap-5 lg:grid-cols-[360px_1fr]">
        <form id="scanForm" class="rounded-lg border border-white/10 bg-stone-900/80 p-4 shadow-2xl shadow-black/20">
          <div class="grid gap-4">
            <label class="grid gap-2">
              <span class="text-sm font-medium text-stone-200">地圖種子碼</span>
              <input
                id="seedInput"
                class="h-11 rounded-md border border-white/10 bg-stone-950 px-3 text-stone-100 outline-none transition focus:border-emerald-400 focus:ring-2 focus:ring-emerald-400/20"
                type="text"
                value="Cherry Finder"
                autocomplete="off"
              />
            </label>

            <label class="grid gap-2">
              <span class="text-sm font-medium text-stone-200">目標生態域</span>
              <select id="biomeSelect" class="h-11 rounded-md border border-white/10 bg-stone-950 px-3 text-stone-100 outline-none transition focus:border-emerald-400 focus:ring-2 focus:ring-emerald-400/20">
                <option value="cherry_grove">櫻花林 Cherry Grove</option>
                <option value="mangrove_swamp">紅樹林沼澤 Mangrove Swamp</option>
                <option value="ice_spikes">冰刺之地 Ice Spikes</option>
                <option value="badlands">惡地 Badlands</option>
                <option value="jungle">叢林 Jungle</option>
                <option value="mushroom_fields">蘑菇島 Mushroom Fields</option>
                <option value="desert">沙漠 Desert</option>
                <option value="snowy_plains">雪原 Snowy Plains</option>
              </select>
            </label>

            <div class="grid grid-cols-2 gap-3">
              <label class="grid gap-2">
                <span class="text-sm font-medium text-stone-200">搜尋範圍 X/Z</span>
                <select id="radiusSelect" class="h-11 rounded-md border border-white/10 bg-stone-950 px-3 text-stone-100 outline-none transition focus:border-emerald-400 focus:ring-2 focus:ring-emerald-400/20">
                  <option value="1000">±1000 格</option>
                  <option value="3000">±3000 格</option>
                  <option value="5000">±5000 格</option>
                  <option value="1000000" selected>±1,000,000 格</option>
                </select>
              </label>

              <label class="grid gap-2">
                <span class="text-sm font-medium text-stone-200">掃描步長</span>
                <select id="stepSelect" class="h-11 rounded-md border border-white/10 bg-stone-950 px-3 text-stone-100 outline-none transition focus:border-emerald-400 focus:ring-2 focus:ring-emerald-400/20">
                  <option value="8">8 格</option>
                  <option value="16">16 格 / Chunk</option>
                  <option value="32">32 格</option>
                  <option value="64">64 格</option>
                  <option value="1000">1,000 格</option>
                  <option value="5000">5,000 格</option>
                  <option value="10000" selected>10,000 格</option>
                </select>
              </label>
            </div>

            <div class="grid grid-cols-2 gap-3 pt-1">
              <button id="startButton" type="submit" class="h-11 rounded-md bg-emerald-400 px-4 font-semibold text-stone-950 transition hover:bg-emerald-300 focus:outline-none focus:ring-2 focus:ring-emerald-300 focus:ring-offset-2 focus:ring-offset-stone-950">
                開始掃描
              </button>
              <button id="stopButton" type="button" class="h-11 rounded-md border border-red-300/40 bg-red-950/50 px-4 font-semibold text-red-100 transition hover:bg-red-900/70 disabled:cursor-not-allowed disabled:opacity-40" disabled>
                停止掃描
              </button>
            </div>

            <div class="grid gap-2">
              <div class="flex items-center justify-between text-sm">
                <span class="text-stone-300">掃描進度</span>
                <span id="progressText" class="font-medium text-emerald-300">0%</span>
              </div>
              <div class="h-3 overflow-hidden rounded-full bg-stone-800">
                <div id="progressBar" class="h-full w-0 rounded-full bg-emerald-400 transition-[width] duration-150"></div>
              </div>
              <p id="statusText" class="min-h-5 text-sm text-stone-400">預設掃描 X/Z 各 ±1,000,000 格。</p>
            </div>
          </div>
        </form>

        <section class="grid gap-5 xl:grid-cols-[1fr_360px]">
          <div class="rounded-lg border border-white/10 bg-stone-900/80 p-4">
            <div class="mb-3 flex flex-wrap items-center justify-between gap-2">
              <h2 class="text-lg font-semibold text-white">地圖預覽</h2>
              <span id="mapMeta" class="text-sm text-stone-400">尚未掃描</span>
            </div>
            <canvas id="mapCanvas" width="900" height="620" class="h-[420px] w-full rounded-md border border-white/10 bg-stone-950 sm:h-[560px]"></canvas>
          </div>

          <aside class="rounded-lg border border-white/10 bg-stone-900/80 p-4">
            <div class="mb-3 flex items-center justify-between gap-2">
              <h2 class="text-lg font-semibold text-white">找到的座標</h2>
              <span id="resultCount" class="rounded-md bg-white/10 px-2 py-1 text-sm text-stone-300">0</span>
            </div>
            <div class="max-h-[560px] overflow-auto rounded-md border border-white/10">
              <table class="w-full text-left text-sm">
                <thead class="sticky top-0 bg-stone-950 text-stone-300">
                  <tr>
                    <th class="px-3 py-2 font-medium">X</th>
                    <th class="px-3 py-2 font-medium">Z</th>
                    <th class="px-3 py-2 font-medium">指令</th>
                  </tr>
                </thead>
                <tbody id="resultsBody" class="divide-y divide-white/10"></tbody>
              </table>
            </div>
            <p id="copyHint" class="mt-3 min-h-5 text-sm text-stone-400">點擊座標列即可複製傳送指令。</p>
          </aside>
        </section>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
